<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login – DhobiWaala</title>
  <meta name="description" content="DhobiWaala Admin Portal – Secure login for administrators."/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f;
      --surface: #13131f;
      --surface2: #1c1c2e;
      --accent: #ff6b35;
      --gold: #ffd166;
      --text: #e8e8f0;
      --muted: #8888a8;
      --success: #06d6a0;
      --error: #ef476f;
      --border: rgba(255,107,53,0.18);
      --glow: 0 0 30px rgba(255,107,53,0.25);
    }
    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }
    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      top: -40%;
      left: -20%;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(255,107,53,0.08) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      animation: pulse 8s ease-in-out infinite alternate;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -30%;
      right: -15%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(255,209,102,0.05) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      animation: pulse 10s ease-in-out infinite alternate-reverse;
      z-index: 0;
    }
    @keyframes pulse {
      0% { transform: scale(1) translate(0,0); opacity: 0.7; }
      100% { transform: scale(1.15) translate(20px, 20px); opacity: 1; }
    }

    /* NAVBAR */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 70px;
      display: flex;
      align-items: center;
      padding: 0 2rem;
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
    }
    .nav-logo {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.5px;
      text-decoration: none;
    }
    .nav-logo span { color: var(--gold); }

    /* MAIN */
    main {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 1.5rem 2rem;
      position: relative;
      z-index: 1;
    }

    /* CARD */
    .login-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,107,53,0.18);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 3rem;
      max-width: 420px;
      width: 100%;
      box-shadow: var(--glow), 0 40px 80px rgba(0,0,0,0.4);
      animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, rgba(255,107,53,0.2), rgba(255,107,53,0.05));
      border: 1px solid rgba(255,107,53,0.3);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin: 0 auto 1.5rem;
      box-shadow: 0 0 20px rgba(255,107,53,0.15);
    }

    .card-title {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--text);
      text-align: center;
      letter-spacing: -0.5px;
      margin-bottom: 0.4rem;
    }
    .card-subtitle {
      color: var(--muted);
      text-align: center;
      font-size: 0.9rem;
      margin-bottom: 2.2rem;
      font-weight: 400;
    }

    /* FORM */
    .form-group {
      margin-bottom: 1.2rem;
    }
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 0.5rem;
    }
    .input-wrap {
      position: relative;
    }
    input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 0.85rem 1rem;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255,107,53,0.12);
    }
    input::placeholder { color: var(--muted); }
    .pw-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--muted);
      font-size: 1rem;
      user-select: none;
      transition: color 0.2s;
      padding: 4px;
    }
    .pw-toggle:hover { color: var(--accent); }

    .btn-login {
      width: 100%;
      height: 52px;
      background: linear-gradient(135deg, #ff6b35, #e55a25);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-top: 1.8rem;
      transition: transform 0.18s, box-shadow 0.18s, opacity 0.18s;
      box-shadow: 0 4px 20px rgba(255,107,53,0.4);
      position: relative;
      overflow: hidden;
    }
    .btn-login::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
      transition: left 0.5s;
    }
    .btn-login:hover::before { left: 100%; }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(255,107,53,0.5); }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

    /* Spinner */
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      color: var(--muted);
      font-size: 0.875rem;
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--accent); }
    .back-link span { margin-right: 0.25rem; }

    .error-msg {
      display: none;
      background: rgba(239,71,111,0.1);
      border: 1px solid rgba(239,71,111,0.3);
      border-radius: 10px;
      padding: 0.85rem 1rem;
      color: var(--error);
      font-size: 0.875rem;
      margin-top: 1rem;
      text-align: center;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 1.8rem 0 0;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <a href="#" class="nav-logo">Dhobi<span>Waala</span></a>
  </nav>

  <!-- MAIN -->
  <main>
    <div class="login-card">
      <div class="card-icon">🛡️</div>
      <h1 class="card-title">Admin Portal</h1>
      <p class="card-subtitle">DhobiWaala Management</p>

      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrap">
            <input type="email" id="email" placeholder="admin@dhobiwaala.com" required autocomplete="username"/>
          </div>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password"/>
            <span class="pw-toggle" id="pwToggle" title="Toggle password visibility">✦</span>
          </div>
        </div>

        <div class="error-msg" id="errorMsg">⚠️ <span id="errorText">Invalid credentials. Please try again.</span></div>

        <button type="submit" class="btn-login" id="loginBtn">
          <div class="spinner" id="spinner"></div>
          <span id="btnText">Sign In to Admin</span>
        </button>
      </form>

      <div class="divider"></div>
      <a href="../UserPage/index.html" class="back-link"><span>←</span> Back to Home</a>
    </div>
  </main>

  <script>
    // Auth redirect check (before DOMContentLoaded)
    if (sessionStorage.getItem('adminToken')) {
      window.location.href = 'adminDashboard.html';
    }

    // Password toggle
    const pwToggle = document.getElementById('pwToggle');
    const passwordInput = document.getElementById('password');
    let showPw = false;
    pwToggle.addEventListener('click', () => {
      showPw = !showPw;
      passwordInput.type = showPw ? 'text' : 'password';
      pwToggle.style.color = showPw ? 'var(--accent)' : 'var(--muted)';
    });

    // Login form
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const loginBtn = document.getElementById('loginBtn');
      const spinner = document.getElementById('spinner');
      const btnText = document.getElementById('btnText');
      const errorMsg = document.getElementById('errorMsg');
      const errorText = document.getElementById('errorText');

      // Show loading
      loginBtn.disabled = true;
      spinner.style.display = 'block';
      btnText.textContent = 'Signing In…';
      errorMsg.style.display = 'none';

      try {
        const response = await fetch('/api/users/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        if (response.ok) {
          const data = await response.json();
          sessionStorage.setItem('adminToken', 'adminToken');
          sessionStorage.setItem('adminUser', JSON.stringify(data));
          btnText.textContent = '✓ Redirecting…';
          setTimeout(() => { window.location.href = 'adminDashboard.html'; }, 500);
        } else {
          let msg = 'Invalid credentials. Please try again.';
          try { const err = await response.json(); msg = err.message || msg; } catch(_) {}
          errorText.textContent = msg;
          errorMsg.style.display = 'block';
          loginBtn.disabled = false;
          spinner.style.display = 'none';
          btnText.textContent = 'Sign In to Admin';
        }
      } catch (err) {
        errorText.textContent = 'Unable to connect to server. Check your connection.';
        errorMsg.style.display = 'block';
        loginBtn.disabled = false;
        spinner.style.display = 'none';
        btnText.textContent = 'Sign In to Admin';
      }
    });
  </script>
</body>
</html>
