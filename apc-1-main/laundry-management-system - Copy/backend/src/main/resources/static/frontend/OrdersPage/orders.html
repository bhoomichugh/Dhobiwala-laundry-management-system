<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Orders — DhobiWaala</title>
  <meta name="description" content="Track and manage your DhobiWaala laundry orders." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script>
    if (!sessionStorage.getItem('loggedInUser')) window.location.href = '../LoginPage/login.html';
    (function(){ const t=localStorage.getItem('dhobiwaala-theme')||'dark'; document.documentElement.setAttribute('data-theme',t); })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root, [data-theme="dark"] {
      --bg: #0a0a0f; --surface: #13131f; --surface2: #1c1c2e;
      --accent: #ff6b35; --gold: #ffd166; --text: #e8e8f0; --muted: #8888a8;
      --success: #06d6a0; --error: #ef476f; --border: rgba(255,107,53,0.18);
      --glow: 0 0 30px rgba(255,107,53,0.25);
      --nav-bg: rgba(10,10,15,0.9); --shadow: rgba(0,0,0,0.3);
    }
    [data-theme="light"] {
      --bg: #f5f3f0; --surface: #ffffff; --surface2: #f0ece6;
      --accent: #e85d26; --gold: #d4a030; --text: #1a1a2e; --muted: #6b6b80;
      --success: #05b88a; --error: #d44060;
      --border: rgba(228,93,38,0.15); --glow: 0 0 20px rgba(228,93,38,0.15);
      --nav-bg: rgba(245,243,240,0.92); --shadow: rgba(0,0,0,0.08);
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.4s, color 0.4s; }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 6%; height: 70px;
      background: var(--nav-bg); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border); transition: all 0.3s;
    }
    nav.scrolled { box-shadow: 0 4px 30px var(--shadow); }
    .nav-logo { font-size: 1.4rem; font-weight: 800; color: var(--accent); text-decoration: none; }
    .nav-logo span { color: var(--gold); }
    .nav-links { display: flex; align-items: center; gap: 1.5rem; list-style: none; }
    .nav-links a { color: var(--muted); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: color 0.2s; }
    .nav-links a:hover { color: var(--text); }
    .nav-links a.active { color: var(--accent); }
    .nav-right { display: flex; align-items: center; gap: 0.8rem; }
    .theme-toggle {
      width: 48px; height: 26px; border-radius: 100px; border: 1px solid var(--border);
      background: var(--surface2); cursor: pointer; position: relative; padding: 0; flex-shrink: 0;
    }
    .theme-toggle .toggle-knob {
      width: 20px; height: 20px; border-radius: 50%; background: var(--accent);
      position: absolute; top: 2px; left: 2px;
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    [data-theme="light"] .theme-toggle .toggle-knob { transform: translateX(22px); }
    .btn-logout {
      background: transparent; border: 1px solid rgba(239,71,111,0.3);
      color: var(--error); padding: 0.4rem 1rem; border-radius: 8px;
      font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .btn-logout:hover { background: rgba(239,71,111,0.1); border-color: var(--error); }
    .hamburger { display: none; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: 4px; z-index: 1001; }
    .hamburger span { display: block; width: 24px; height: 2.5px; background: var(--text); border-radius: 2px; transition: all 0.35s; }
    .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .hamburger.active span:nth-child(2) { opacity: 0; }
    .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }
    .mobile-overlay { display: none; position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); opacity: 0; transition: opacity 0.3s; }
    .mobile-overlay.show { display: block; opacity: 1; }
    .mobile-menu { display: none; position: fixed; top: 0; right: -300px; z-index: 1000; width: 280px; height: 100vh; background: var(--surface); padding: 90px 2rem 2rem; transition: right 0.4s; border-left: 1px solid var(--border); }
    .mobile-menu.show { display: block; right: 0; }
    .mobile-menu a { display: block; padding: 1rem 0; color: var(--text); text-decoration: none; font-size: 1.05rem; font-weight: 600; border-bottom: 1px solid var(--border); transition: all 0.2s; }
    .mobile-menu a:hover { color: var(--accent); padding-left: 0.5rem; }
    @media (max-width: 768px) { .nav-links { display: none; } .hamburger { display: flex; } }

    /* PAGE HEADER */
    .page-header {
      padding: 110px 6% 40px;
      background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(255,107,53,0.1) 0%, transparent 70%);
    }
    .page-header .top { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem; }
    .page-header h1 { font-size: clamp(1.6rem, 3vw, 2.4rem); font-weight: 800; letter-spacing: -0.6px; }
    .btn-new-order {
      background: linear-gradient(135deg, var(--accent), #e55a25);
      color: #fff; padding: 0.6rem 1.4rem; border-radius: 10px;
      font-weight: 700; font-size: 0.9rem; text-decoration: none;
      box-shadow: var(--glow); transition: all 0.2s; white-space: nowrap;
    }
    .btn-new-order:hover { transform: translateY(-2px); }

    /* STATS STRIP */
    .stats-strip {
      display: flex; gap: 1rem; flex-wrap: wrap; padding: 0 6%; margin-bottom: 1.5rem;
    }
    .stat-pill {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 0.8rem 1.4rem; display: flex; align-items: center; gap: 0.6rem;
      transition: all 0.3s; flex: 1; min-width: 140px;
    }
    .stat-pill:hover { transform: translateY(-2px); box-shadow: 0 8px 20px var(--shadow); }
    .stat-pill .stat-icon { font-size: 1.5rem; }
    .stat-pill .stat-value { font-size: 1.3rem; font-weight: 800; color: var(--accent); }
    .stat-pill .stat-label { font-size: 0.75rem; color: var(--muted); font-weight: 500; }

    /* SEARCH & FILTER */
    .toolbar {
      padding: 0 6%; margin-bottom: 1.5rem; display: flex; gap: 1rem; flex-wrap: wrap; align-items: center;
    }
    .search-box { flex: 1; min-width: 200px; position: relative; }
    .search-box input {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 0.7rem 1rem 0.7rem 2.6rem; color: var(--text);
      font-family: 'Inter', sans-serif; font-size: 0.88rem; outline: none; transition: all 0.3s;
    }
    .search-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,107,53,0.1); }
    .search-box input::placeholder { color: var(--muted); }
    .search-box .search-icon { position: absolute; left: 0.9rem; top: 50%; transform: translateY(-50%); font-size: 0.9rem; color: var(--muted); }

    /* FILTER TABS */
    .filter-tabs { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .filter-tab {
      padding: 0.45rem 1.1rem; border-radius: 8px; font-size: 0.85rem; font-weight: 600;
      border: 1px solid var(--border); background: transparent; color: var(--muted);
      cursor: pointer; transition: all 0.2s;
    }
    .filter-tab:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
    .filter-tab.active { background: rgba(255,107,53,0.15); border-color: rgba(255,107,53,0.4); color: var(--accent); }
    .filter-tab .count {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 20px; height: 20px; border-radius: 100px; font-size: 0.7rem;
      background: rgba(255,107,53,0.15); color: var(--accent); margin-left: 0.3rem;
      padding: 0 0.4rem; font-weight: 700;
    }

    /* ORDERS CONTENT */
    .orders-section { padding: 0 6% 80px; }
    .loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5rem; gap: 1rem; }
    .loader { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    .loading-state p { color: var(--muted); }
    .empty-state { text-align: center; padding: 5rem 2rem; }
    .empty-state .empty-icon { font-size: 4rem; margin-bottom: 1rem; opacity: 0.5; }
    .empty-state h3 { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.5rem; }
    .empty-state p { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }

    /* ORDER CARDS */
    .orders-grid { display: flex; flex-direction: column; gap: 1rem; }
    .order-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      padding: 1.5rem 2rem; display: flex; align-items: center; gap: 1.5rem;
      transition: all 0.25s; animation: fadeUp 0.4s ease both;
    }
    .order-card:hover { border-color: rgba(255,107,53,0.3); transform: translateX(4px); }
    .order-icon {
      width: 52px; height: 52px; border-radius: 14px; flex-shrink: 0;
      background: linear-gradient(135deg, rgba(255,107,53,0.2), rgba(255,209,102,0.1));
      display: flex; align-items: center; justify-content: center; font-size: 1.6rem;
    }
    .order-info { flex: 1; min-width: 0; }
    .order-service { font-size: 1rem; font-weight: 700; margin-bottom: 0.3rem; }
    .order-meta { font-size: 0.82rem; color: var(--muted); display: flex; gap: 1rem; flex-wrap: wrap; }
    .order-meta span { display: flex; align-items: center; gap: 0.3rem; }
    .status-badge {
      padding: 0.3rem 0.8rem; border-radius: 100px; font-size: 0.78rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em; flex-shrink: 0;
    }
    .status-PENDING { background: rgba(255,107,53,0.15); color: var(--accent); border: 1px solid rgba(255,107,53,0.3); }
    .status-Completed { background: rgba(6,214,160,0.15); color: var(--success); border: 1px solid rgba(6,214,160,0.3); }
    .status-Cancelled { background: rgba(239,71,111,0.15); color: var(--error); border: 1px solid rgba(239,71,111,0.3); }
    .order-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }
    .btn-action {
      padding: 0.45rem 1rem; border-radius: 8px; font-size: 0.82rem; font-weight: 600;
      cursor: pointer; border: 1px solid; transition: all 0.2s; font-family: 'Inter', sans-serif;
    }
    .btn-cancel { border-color: rgba(239,71,111,0.35); color: var(--error); background: transparent; }
    .btn-cancel:hover { background: rgba(239,71,111,0.1); }
    .btn-done { border-color: rgba(6,214,160,0.35); color: var(--success); background: transparent; }
    .btn-done:hover { background: rgba(6,214,160,0.1); }

    /* SORT DROPDOWN */
    .sort-select {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); padding: 0.55rem 0.8rem; font-family: 'Inter', sans-serif;
      font-size: 0.85rem; outline: none; cursor: pointer; transition: all 0.2s;
    }
    .sort-select:focus { border-color: var(--accent); }
    .sort-select option { background: var(--surface); color: var(--text); }

    /* TOAST */
    .toast {
      position: fixed; bottom: 2rem; right: 2rem; z-index: 9999;
      padding: 1rem 1.5rem; border-radius: 12px; font-size: 0.9rem; font-weight: 600;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4); transform: translateY(100px);
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1); max-width: 320px;
    }
    .toast.show { transform: translateY(0); }
    .toast.success { background: rgba(6,214,160,0.15); border: 1px solid rgba(6,214,160,0.4); color: var(--success); }
    .toast.error { background: rgba(239,71,111,0.15); border: 1px solid rgba(239,71,111,0.4); color: var(--error); }

    /* BACK TO TOP */
    .back-to-top {
      position: fixed; bottom: 2rem; left: 2rem; z-index: 900;
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #e55a25);
      color: #fff; border: none; cursor: pointer; font-size: 1.2rem;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 25px rgba(255,107,53,0.3);
      transform: translateY(80px); opacity: 0;
      transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    .back-to-top.show { transform: translateY(0); opacity: 1; }
    .back-to-top:hover { transform: translateY(-4px) scale(1.05); }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 768px) {
      .order-card { flex-direction: column; align-items: flex-start; gap: 1rem; }
      .order-actions { width: 100%; }
      .stats-strip { gap: 0.5rem; }
      .stat-pill { min-width: 100px; padding: 0.6rem 1rem; }
      .toolbar { flex-direction: column; }
    }
  </style>
</head>
<body>

<nav id="mainNav">
  <a href="../HomePage/home.html" class="nav-logo">Dhobi<span>Waala</span></a>
  <ul class="nav-links">
    <li><a href="../HomePage/home.html">Home</a></li>
    <li><a href="../LoginPage/userDashboard.html">Dashboard</a></li>
    <li><a href="../ServicesPage/services.html">Services</a></li>
    <li><a href="orders.html" class="active">My Orders</a></li>
  </ul>
  <div class="nav-right">
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
      <div class="toggle-knob" id="toggleKnob">🌙</div>
    </button>
    <button class="btn-logout" id="logoutBtn">Logout</button>
    <button class="hamburger" id="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<div class="mobile-overlay" id="mobileOverlay"></div>
<div class="mobile-menu" id="mobileMenu">
  <a href="../HomePage/home.html">🏠 Home</a>
  <a href="../LoginPage/userDashboard.html">Dashboard</a>
  <a href="../ServicesPage/services.html">🧺 Services</a>
  <a href="orders.html">📋 My Orders</a>
</div>

<div class="page-header">
  <div class="top">
    <h1>My Orders 🧺</h1>
    <a href="../ServicesPage/services.html" class="btn-new-order">+ New Order</a>
  </div>
  <div class="filter-tabs" id="filterTabs">
    <button class="filter-tab active" data-filter="ALL">All <span class="count" id="count-all">0</span></button>
    <button class="filter-tab" data-filter="PENDING">Pending <span class="count" id="count-pending">0</span></button>
    <button class="filter-tab" data-filter="Completed">Completed <span class="count" id="count-completed">0</span></button>
    <button class="filter-tab" data-filter="Cancelled">Cancelled <span class="count" id="count-cancelled">0</span></button>
  </div>
</div>

<!-- STATS STRIP -->
<div class="stats-strip" id="statsStrip">
  <div class="stat-pill">
    <div class="stat-icon">📦</div>
    <div><div class="stat-value" id="statTotal">—</div><div class="stat-label">Total Orders</div></div>
  </div>
  <div class="stat-pill">
    <div class="stat-icon">⏳</div>
    <div><div class="stat-value" id="statPending">—</div><div class="stat-label">Pending</div></div>
  </div>
  <div class="stat-pill">
    <div class="stat-icon">✅</div>
    <div><div class="stat-value" id="statCompleted">—</div><div class="stat-label">Completed</div></div>
  </div>
  <div class="stat-pill">
    <div class="stat-icon">⚖️</div>
    <div><div class="stat-value" id="statKg">—</div><div class="stat-label">Total kg</div></div>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search orders by service name..." />
  </div>
  <select class="sort-select" id="sortSelect">
    <option value="newest">Newest First</option>
    <option value="oldest">Oldest First</option>
    <option value="service">By Service</option>
    <option value="quantity">By Quantity</option>
  </select>
</div>

<section class="orders-section">
  <div id="ordersContainer">
    <div class="loading-state">
      <div class="loader"></div>
      <p>Loading your orders...</p>
    </div>
  </div>
</section>

<div class="toast" id="toast"></div>
<button class="back-to-top" id="backToTop" aria-label="Back to top">↑</button>

<script>
  const loggedUser = JSON.parse(sessionStorage.getItem('loggedInUser'));
  if (!loggedUser) window.location.href = '../LoginPage/login.html';

  document.getElementById('logoutBtn').addEventListener('click', () => {
    sessionStorage.removeItem('loggedInUser');
    window.location.href = '../LoginPage/login.html';
  });

  const SERVICE_ICONS = {
    'Wash & Fold': '👕', 'Dry Cleaning': '✨', 'Ironing': '👔',
    'Stain Removal': '🔬', 'Express Delivery': '⚡', 'Subscription Plans': '📦'
  };

  function getPaymentDetails(order) {
    const savedPayments = JSON.parse(localStorage.getItem('dhobiwaala-payments') || '{}');
    const saved = savedPayments[order.id] || {};
    return {
      method: order.paymentMethod || saved.paymentMethod || 'CASH',
      status: order.paymentStatus || saved.paymentStatus || 'PAY_ON_DELIVERY',
      amount: order.totalAmount || saved.totalAmount || ((order.quantity || 1) * 50)
    };
  }

  let allOrders = [];
  let activeFilter = 'ALL';
  let searchQuery = '';
  let sortMode = 'newest';

  function showToast(msg, type = 'success') {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = `toast ${type} show`;
    setTimeout(() => toast.classList.remove('show'), 3500);
  }

  function updateStats() {
    const pending = allOrders.filter(o => !o.status || o.status === 'PENDING').length;
    const completed = allOrders.filter(o => o.status === 'Completed').length;
    const cancelled = allOrders.filter(o => o.status === 'Cancelled').length;
    const totalKg = allOrders.reduce((sum, o) => sum + (o.quantity || 1), 0);

    document.getElementById('statTotal').textContent = allOrders.length;
    document.getElementById('statPending').textContent = pending;
    document.getElementById('statCompleted').textContent = completed;
    document.getElementById('statKg').textContent = totalKg + ' kg';

    document.getElementById('count-all').textContent = allOrders.length;
    document.getElementById('count-pending').textContent = pending;
    document.getElementById('count-completed').textContent = completed;
    document.getElementById('count-cancelled').textContent = cancelled;
  }

  function renderOrders(orders) {
    const container = document.getElementById('ordersContainer');
    if (!orders.length) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🧺</div>
          <h3>No orders found</h3>
          <p>${activeFilter === 'ALL' ? (searchQuery ? 'No orders match your search.' : "You haven't placed any orders yet.") : `No ${activeFilter.toLowerCase()} orders.`}</p>
          <a href="../ServicesPage/services.html" class="btn-new-order">Browse Services →</a>
        </div>`;
      return;
    }

    container.innerHTML = `<div class="orders-grid">${orders.map((o, i) => {
      const icon = SERVICE_ICONS[o.service] || '🧺';
      const statusClass = o.status ? o.status.replace(/\s/g, '') : 'PENDING';
      const isPending = !o.status || o.status === 'PENDING';
      const payment = getPaymentDetails(o);
      return `
        <div class="order-card" style="animation-delay:${i * 60}ms">
          <div class="order-icon">${icon}</div>
          <div class="order-info">
            <div class="order-service">${o.service || 'Laundry Service'}</div>
            <div class="order-meta">
              <span>📦 Order #${o.id}</span>
              <span>⚖️ ${o.quantity || 1} kg</span>
              <span>Payment: ${payment.method} - Rs. ${payment.amount}</span>
              ${o.userId ? `<span>👤 User #${o.userId}</span>` : ''}
            </div>
          </div>
          <div class="status-badge status-${statusClass}">${o.status || 'PENDING'}</div>
          ${isPending ? `
          <div class="order-actions">
            <button class="btn-action btn-done" onclick="updateStatus(${o.id}, 'Completed')">✓ Done</button>
            <button class="btn-action btn-cancel" onclick="updateStatus(${o.id}, 'Cancelled')">✕ Cancel</button>
          </div>` : ''}
        </div>`;
    }).join('')}</div>`;
  }

  function sortOrders(orders) {
    const sorted = [...orders];
    switch (sortMode) {
      case 'oldest': sorted.sort((a, b) => a.id - b.id); break;
      case 'newest': sorted.sort((a, b) => b.id - a.id); break;
      case 'service': sorted.sort((a, b) => (a.service || '').localeCompare(b.service || '')); break;
      case 'quantity': sorted.sort((a, b) => (b.quantity || 1) - (a.quantity || 1)); break;
    }
    return sorted;
  }

  function applyFilter() {
    let filtered = activeFilter === 'ALL' ? allOrders : allOrders.filter(o => o.status === activeFilter);
    if (searchQuery) {
      filtered = filtered.filter(o =>
        (o.service || '').toLowerCase().includes(searchQuery.toLowerCase()) ||
        String(o.id).includes(searchQuery)
      );
    }
    filtered = sortOrders(filtered);
    renderOrders(filtered);
  }

  async function loadOrders() {
    try {
      const email = loggedUser.email;
      const url = `/api/orders?email=${encodeURIComponent(email)}`;
      const res = await fetch(url);
      if (res.ok) {
        allOrders = await res.json();
      } else {
        const res2 = await fetch('/api/orders');
        allOrders = res2.ok ? await res2.json() : [];
      }
      updateStats();
      applyFilter();
    } catch (e) {
      document.getElementById('ordersContainer').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">⚠️</div>
          <h3>Connection error</h3>
          <p>Could not load orders. Make sure the backend is running.</p>
        </div>`;
    }
  }

  async function updateStatus(orderId, status) {
    try {
      const res = await fetch(`/api/orders/${orderId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status })
      });
      if (res.ok) {
        showToast(status === 'Completed' ? '✅ Order marked as completed!' : '❌ Order cancelled.');
        loadOrders();
      } else {
        showToast('Failed to update order.', 'error');
      }
    } catch {
      showToast('Connection error.', 'error');
    }
  }

  // Filter tabs
  document.querySelectorAll('.filter-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activeFilter = tab.dataset.filter;
      applyFilter();
    });
  });

  // Search
  document.getElementById('searchInput').addEventListener('input', (e) => {
    searchQuery = e.target.value;
    applyFilter();
  });

  // Sort
  document.getElementById('sortSelect').addEventListener('change', (e) => {
    sortMode = e.target.value;
    applyFilter();
  });

  // Theme toggle
  const themeToggle = document.getElementById('themeToggle');
  const toggleKnob = document.getElementById('toggleKnob');
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('dhobiwaala-theme', theme);
    toggleKnob.textContent = theme === 'dark' ? '🌙' : '☀️';
  }
  themeToggle.addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme');
    applyTheme(current === 'dark' ? 'light' : 'dark');
  });
  applyTheme(localStorage.getItem('dhobiwaala-theme') || 'dark');

  // Hamburger
  const hamburger = document.getElementById('hamburger');
  const mobileMenu = document.getElementById('mobileMenu');
  const mobileOverlay = document.getElementById('mobileOverlay');
  function toggleMobileMenu() {
    hamburger.classList.toggle('active');
    mobileMenu.classList.toggle('show');
    mobileOverlay.classList.toggle('show');
    document.body.style.overflow = mobileMenu.classList.contains('show') ? 'hidden' : '';
  }
  hamburger.addEventListener('click', toggleMobileMenu);
  mobileOverlay.addEventListener('click', toggleMobileMenu);

  // Nav scroll
  window.addEventListener('scroll', () => {
    document.getElementById('mainNav').classList.toggle('scrolled', window.scrollY > 50);
  });

  // Back to top
  const backToTop = document.getElementById('backToTop');
  window.addEventListener('scroll', () => { backToTop.classList.toggle('show', window.scrollY > 300); });
  backToTop.addEventListener('click', () => { window.scrollTo({ top: 0, behavior: 'smooth' }); });

  loadOrders();
</script>
</body>
</html>
